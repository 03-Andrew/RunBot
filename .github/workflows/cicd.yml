name: CI/CD

on:
  push:
    branches:
      - main
      - cicd
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-1
      TF_VAR_discord_public_key: ${{ secrets.DISCORD_PUBLIC_KEY }}
      TF_VAR_discord_application_id: ${{ secrets.DISCORD_APPLICATION_ID }}
      TF_VAR_strava_client_id: ${{ secrets.STRAVA_CLIENT_ID }}
      TF_VAR_strava_client_secret: ${{ secrets.STRAVA_CLIENT_SECRET }}
      TF_VAR_verify_token: ${{ secrets.VERIFY_TOKEN }}
      TF_VAR_discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
      TF_VAR_discord_channel_id: ${{ secrets.DISCORD_CHANNEL_ID }}
      TR_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            lambdas/health/package-lock.json

      - name: Install Lambda dependencies
        working-directory: lambdas/health
        run: npm ci

      - name: Type check Lambda
        working-directory: lambdas/health
        run: npx tsc -p tsconfig.json

      - name: Build Lambda bundle
        working-directory: lambdas/health
        run: npm run build

      - name: Register Discord commands
        env:
          APP_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: node scripts/registerCommand.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve -input=false
