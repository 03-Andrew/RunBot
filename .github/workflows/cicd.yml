name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            lambdas/health/package-lock.json

      - name: Install Lambda dependencies
        working-directory: lambdas/health
        run: npm ci

      - name: Type check Lambda
        working-directory: lambdas/health
        run: npx tsc -p tsconfig.json

      - name: Build Lambda bundle
        working-directory: lambdas/health
        run: npm run build

      - name: Register Discord commands
        env:
          APP_ID: ${{ secrets.DISCORD_APP_ID }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: node scripts/registerCommand.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve
